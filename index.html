<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>模具分级管理系统 - 现代菜单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background: #0a0a2a;
        }

        /* 左侧菜单面板 - 毛玻璃效果 */
        .menu-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(25, 30, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            z-index: 20;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .menu-header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.2);
        }

        .menu-header h3 {
            color: #ffaa66;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-header h3::before {
            content: "🏭";
            font-size: 1.3rem;
        }

        /* 面包屑导航 */
        .breadcrumb {
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 0.85rem;
            color: #aaa;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
        }

        .breadcrumb-item {
            cursor: pointer;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .breadcrumb-item:hover {
            color: #ffaa66;
        }

        .breadcrumb-sep {
            color: #555;
            font-size: 0.7rem;
        }

        /* 菜单内容区域（当前层级的选项列表） */
        .menu-content {
            padding: 16px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .menu-item {
            background: rgba(255, 255, 255, 0.08);
            margin-bottom: 10px;
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid transparent;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateX(4px);
            border-color: rgba(255, 170, 102, 0.3);
        }

        .menu-item.folder {
            border-left: 4px solid #ffaa66;
        }

        .menu-item.mold {
            border-left: 4px solid #4c9f70;
        }

        .item-name {
            font-size: 1rem;
            font-weight: 500;
            color: #f0f0f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-icon {
            font-size: 1.2rem;
        }

        .item-arrow {
            color: #aaa;
            font-size: 0.8rem;
        }

        .empty-message {
            color: #aaa;
            text-align: center;
            padding: 30px 0;
            font-style: italic;
        }

        /* 右侧材料面板（保持不变） */
        #material-panel {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            color: #ffdd88;
            padding: 16px 24px;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            border-right: 3px solid #ffaa44;
            min-width: 260px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #ccc;
            pointer-events: none;
            font-family: monospace;
        }

        /* 滚动条美化 */
        .menu-content::-webkit-scrollbar {
            width: 5px;
        }
        .menu-content::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .menu-content::-webkit-scrollbar-thumb {
            background: #ffaa66;
            border-radius: 10px;
        }

        @media (max-width: 700px) {
            .menu-panel { width: 280px; }
            .item-name { font-size: 0.9rem; }
            #material-panel { min-width: 200px; padding: 12px 16px; }
        }
    </style>
</head>
<body>
    <div class="menu-panel">
        <div class="menu-header">
            <h3>模具分级目录</h3>
        </div>
        <div class="breadcrumb" id="breadcrumb">
            <!-- 动态生成面包屑 -->
        </div>
        <div class="menu-content" id="menu-content">
            <!-- 动态生成当前层级菜单项 -->
        </div>
    </div>
    <div id="material-panel">
        <h3>🔧 镶块材料</h3>
        <p id="material-content">请从左侧选择模具</p>
    </div>
    <div class="instruction">
        🖱️ 鼠标拖拽旋转 | 右键平移 | 滚轮缩放 | 点击锁定材料
    </div>

    <!-- Three.js 引入 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ========= 1. 基础几何模板（与之前相同） =========
        const baseGeometry = {
            inserts: [
                { id: "cavity_fixed", name: "定模主型腔镶块", side: "定模", pos: [0.0, 0.62, 0.0], size: [1.85, 0.42, 1.55], defaultColor: 0x3a86ff },
                { id: "sprue_bush", name: "浇口套镶块", side: "定模", pos: [1.25, 0.73, 0.85], size: [0.52, 0.28, 0.52], defaultColor: 0xe76f51 },
                { id: "cooling_fixed", name: "定模随形冷却镶块", side: "定模", pos: [-0.85, 0.55, 1.05], size: [0.64, 0.22, 0.85], defaultColor: 0x4c9f70 },
                { id: "core_movable", name: "动模型芯镶块", side: "动模", pos: [0.0, 0.18, 0.0], size: [1.68, 0.52, 1.45], defaultColor: 0xf4a261 },
                { id: "sliders", name: "侧抽芯滑块组", side: "动模", pos: [1.28, 0.08, -1.08], size: [0.72, 0.38, 0.52], defaultColor: 0x9c89b8 },
                { id: "ejector_plate", name: "顶杆固定板镶块", side: "动模", pos: [-1.18, -0.06, -0.68], size: [0.82, 0.22, 0.84], defaultColor: 0x70d6ff }
            ]
        };

        const materialColorMap = {
            "H13": 0x3a86ff,
            "H13改进型": 0x5e9bff,
            "CPM 10V": 0xe76f51,
            "DHA™-GIGA": 0xd97706,
            "3D打印 MS1": 0x4c9f70,
            "Dievar": 0xf4a261,
            "氮化钢": 0x9c89b8,
            "Cr12MoV": 0x70d6ff,
            "SKD61+渗氮": 0x8b5cf6,
            "DH31-EX": 0x14b8a6,
            "铜合金": 0xb87333,
            "H13+涂层": 0xec4899
        };
        function getColorForMaterial(mat) {
            return materialColorMap[mat] || 0xcccccc;
        }

        // ========= 2. Three.js 场景初始化 =========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.006);
        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4.5, 3.8, 5.2);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.35, 0);

        // 灯光
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(2, 5, 3);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4488cc, 0.35);
        backLight.position.set(-2, 1.5, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.45);
        fillLight.position.set(1.2, 2.2, 2);
        scene.add(fillLight);
        const grid = new THREE.GridHelper(7.5, 20, 0x77aaff, 0x335588);
        grid.position.y = -0.7;
        scene.add(grid);
        const basePlane = new THREE.Mesh(
            new THREE.PlaneGeometry(5.2, 4.5),
            new THREE.MeshStandardMaterial({ color: 0x2c5f8a, transparent: true, opacity: 0.12, side: THREE.DoubleSide })
        );
        basePlane.rotation.x = -Math.PI/2;
        basePlane.position.y = -0.7;
        scene.add(basePlane);

        // ========= 3. 全局变量 =========
        let currentMeshes = [];
        let currentLabels = [];
        let currentHighlight = null;
        let lockedMesh = null;
        let materialsDB = {};
        let treeData = null;
        let currentPath = []; // 存储 { node, name } 路径，用于面包屑

        const materialContent = document.getElementById('material-content');
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 交互函数
        function resetHighlight(obj) { if (obj && obj.material) obj.material.emissiveIntensity = 0; }
        function applyHighlight(obj) { if (obj && obj.material) obj.material.emissiveIntensity = 0.5; }
        function updateMaterialPanel(obj, locked = false) {
            if (!obj) {
                if (!lockedMesh) materialContent.innerHTML = "请点击或悬停镶块查看材料";
                return;
            }
            const data = obj.userData;
            materialContent.innerHTML = `<strong>${data.name}</strong><br>材料：${data.material}<br>所属：${data.side}`;
        }

        function onMouseMove(event) {
            if (lockedMesh) return;
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(currentMeshes);
            if (currentHighlight) resetHighlight(currentHighlight);
            currentHighlight = null;
            if (intersects.length > 0) {
                currentHighlight = intersects[0].object;
                applyHighlight(currentHighlight);
                updateMaterialPanel(currentHighlight, false);
            } else {
                if (!lockedMesh) materialContent.innerHTML = "请点击或悬停镶块查看材料";
            }
        }

        function onClick(event) {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(currentMeshes);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                if (lockedMesh === hit) {
                    lockedMesh = null;
                    updateMaterialPanel(null);
                    if (currentHighlight) resetHighlight(currentHighlight);
                    currentHighlight = null;
                } else {
                    if (lockedMesh) resetHighlight(lockedMesh);
                    lockedMesh = hit;
                    if (currentHighlight && currentHighlight !== lockedMesh) resetHighlight(currentHighlight);
                    currentHighlight = lockedMesh;
                    applyHighlight(lockedMesh);
                    updateMaterialPanel(lockedMesh, true);
                }
            } else {
                if (lockedMesh) {
                    resetHighlight(lockedMesh);
                    lockedMesh = null;
                    updateMaterialPanel(null);
                }
            }
        }
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('click', onClick);

        // ========= 4. 模具加载 =========
        function loadMold(moldId) {
            if (!materialsDB[moldId]) {
                console.warn(`未找到模具 ${moldId} 的材料数据`);
                return;
            }
            // 清除旧模型
            currentMeshes.forEach(m => scene.remove(m));
            currentLabels.forEach(l => scene.remove(l));
            currentMeshes = [];
            currentLabels = [];
            if (currentHighlight) resetHighlight(currentHighlight);
            lockedMesh = null;
            currentHighlight = null;

            const moldData = materialsDB[moldId];
            baseGeometry.inserts.forEach(insert => {
                const materialName = moldData.materials[insert.id];
                const color = getColorForMaterial(materialName) || insert.defaultColor;
                const geometry = new THREE.BoxGeometry(...insert.size);
                const material = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.4 });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(insert.pos[0], insert.pos[1], insert.pos[2]);
                mesh.castShadow = true;
                mesh.userData = {
                    id: insert.id,
                    name: insert.name,
                    material: materialName || "未知",
                    side: insert.side,
                    colorHex: color.toString(16)
                };
                scene.add(mesh);
                currentMeshes.push(mesh);

                const div = document.createElement('div');
                div.textContent = insert.name;
                div.style.cssText = `background:rgba(0,0,0,0.65);color:white;padding:2px 10px;border-radius:20px;font-size:12px;border-left:3px solid #${color.toString(16)};white-space:nowrap;backdrop-filter:blur(4px);`;
                const label = new CSS2DObject(div);
                label.position.set(insert.pos[0], insert.pos[1] + insert.size[1]/2 + 0.15, insert.pos[2]);
                scene.add(label);
                currentLabels.push(label);
            });
            materialContent.innerHTML = `当前模具：${moldData.name}<br>请点击镶块查看材料`;
        }

        // ========= 5. 菜单渲染逻辑（分层导航） =========
        function renderMenu(node, pathArray) {
            // node 是当前要展示的节点（通常为 folder 或 root）
            // pathArray 是面包屑路径数组 [{ name, node }]
            const container = document.getElementById('menu-content');
            const breadcrumbDiv = document.getElementById('breadcrumb');
            
            // 更新面包屑
            breadcrumbDiv.innerHTML = '';
            pathArray.forEach((item, idx) => {
                const span = document.createElement('span');
                span.className = 'breadcrumb-item';
                span.innerHTML = `<span class="item-icon">📁</span> ${item.name}`;
                span.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // 回到该层级：截断路径到 idx
                    const newPath = pathArray.slice(0, idx + 1);
                    renderMenu(item.node, newPath);
                });
                breadcrumbDiv.appendChild(span);
                if (idx < pathArray.length - 1) {
                    const sep = document.createElement('span');
                    sep.className = 'breadcrumb-sep';
                    sep.textContent = '›';
                    breadcrumbDiv.appendChild(sep);
                }
            });
            
            // 获取子节点
            let children = [];
            if (node.type === 'root' || node.type === 'folder') {
                children = node.children || [];
            } else {
                // 如果不是 folder，不应该调用 renderMenu，但防御一下
                children = [];
            }
            
            if (children.length === 0) {
                container.innerHTML = '<div class="empty-message">📂 此目录为空</div>';
                return;
            }
            
            // 生成菜单项
            container.innerHTML = '';
            children.forEach(child => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `menu-item ${child.type === 'folder' ? 'folder' : 'mold'}`;
                const nameSpan = document.createElement('div');
                nameSpan.className = 'item-name';
                const icon = child.type === 'folder' ? '📁' : '🔩';
                nameSpan.innerHTML = `<span class="item-icon">${icon}</span> ${child.name}`;
                itemDiv.appendChild(nameSpan);
                if (child.type === 'folder') {
                    const arrow = document.createElement('span');
                    arrow.className = 'item-arrow';
                    arrow.textContent = '›';
                    itemDiv.appendChild(arrow);
                    itemDiv.addEventListener('click', () => {
                        // 进入下一级
                        const newPath = [...pathArray, { name: child.name, node: child }];
                        renderMenu(child, newPath);
                    });
                } else if (child.type === 'mold') {
                    // 模具节点：点击加载模具
                    itemDiv.addEventListener('click', () => {
                        loadMold(child.moldId);
                        // 可选：高亮当前选中的模具项
                        document.querySelectorAll('.menu-item.mold').forEach(el => el.style.background = '');
                        itemDiv.style.background = 'rgba(230,126,34,0.3)';
                    });
                }
                container.appendChild(itemDiv);
            });
        }
        
        // ========= 6. 初始化：加载JSON并显示根菜单 =========
        Promise.all([
            fetch('treeData.json').then(res => res.json()),
            fetch('materials.json').then(res => res.json())
        ]).then(([tree, materials]) => {
            treeData = tree;
            materialsDB = materials;
            // 将根节点包装为可渲染的对象
            const rootNode = { type: 'root', name: '模具库', children: treeData.children };
            const initialPath = [{ name: '模具库', node: rootNode }];
            renderMenu(rootNode, initialPath);
        }).catch(err => {
            console.error('加载失败', err);
            document.getElementById('menu-content').innerHTML = '<div class="empty-message" style="color:red">加载失败，请确保 treeData.json 和 materials.json 存在且格式正确</div>';
        });
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
