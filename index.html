<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多模具可视化管理系统 - 压铸模具镶块材料</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        /* UI 控制面板 - 固定在左侧 */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px 20px;
            color: white;
            z-index: 20;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            font-family: monospace;
            min-width: 180px;
        }
        #ui-panel h3 {
            margin: 0 0 12px 0;
            font-size: 18px;
            text-align: center;
            color: #ffaa66;
        }
        .mold-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .mold-btn {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s ease;
            text-align: left;
            padding-left: 20px;
            letter-spacing: 1px;
        }
        .mold-btn:hover {
            background: #1e6f5c;
            transform: translateX(5px);
        }
        .mold-btn.active {
            background: #e67e22;
            box-shadow: 0 0 8px rgba(230,126,34,0.5);
        }
        .mold-info {
            margin-top: 15px;
            font-size: 12px;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 10px;
            color: #ccc;
        }
        /* 右侧材料面板 */
        #material-panel {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: #ffdd88;
            padding: 16px 24px;
            border-radius: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            border-right: 3px solid #ffaa44;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            min-width: 260px;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        #material-panel h3 {
            margin: 0 0 8px 0;
            color: #ffaa44;
            font-size: 18px;
        }
        #material-panel p {
            margin: 0;
            line-height: 1.5;
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            color: #ccc;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
        }
        @media (max-width: 600px) {
            #material-panel { padding: 10px 16px; min-width: 180px; font-size: 12px; }
            #ui-panel { padding: 10px 15px; min-width: 140px; }
            .mold-btn { font-size: 14px; padding: 6px 12px; }
        }
    </style>
</head>
<body>
    <div id="ui-panel">
        <h3>🏭一体化压铸模具库</h3>
        <div class="mold-buttons" id="mold-buttons-container">
            <!-- 动态生成按钮 -->
        </div>
        <div class="mold-info" id="mold-info">
            💡 点击切换模具
        </div>
    </div>
    <div id="material-panel">
        <h3>📌 镶块材料</h3>
        <p id="material-content">👆 鼠标悬停或点击任意区域</p>
    </div>
    <div class="instruction">
        🖱️ 鼠标拖拽旋转 | 右键平移 | 滚轮缩放 | 点击锁定查看材料
    </div>

    <!-- 引入Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ========= 1. 定义多套模具的数据配置 =========
        // 每套模具包含一个唯一的编号和镶块数组（每个镶块有 id, name, side, color, material, pos, size, roughness, metalness）
        // 您可以根据实际模具修改这里的配置
        const moldsData = {
            "M001": {
                name: "前机舱模具",
                description: "一体化压铸前机舱 | 6个镶块",
                inserts: [
                    // 定模侧
                    { id: "cavity_fixed", name: "定模主型腔镶块", side: "定模", color: 0x3a86ff, material: "H13 (普通热作钢)", pos: [0.0, 0.62, 0.0], size: [1.85, 0.42, 1.55], roughness: 0.48, metalness: 0.32 },
                    { id: "sprue_bush", name: "浇口套镶块", side: "定模", color: 0xe76f51, material: "粉末冶金高速钢 (CPM 10V)", pos: [1.25, 0.73, 0.85], size: [0.52, 0.28, 0.52], roughness: 0.2, metalness: 0.82 },
                    { id: "cooling_fixed", name: "定模随形冷却镶块", side: "定模", color: 0x4c9f70, material: "3D打印 MS1 马氏体时效钢", pos: [-0.85, 0.55, 1.05], size: [0.64, 0.22, 0.85], roughness: 0.28, metalness: 0.65 },
                    // 动模侧
                    { id: "core_movable", name: "动模型芯镶块", side: "动模", color: 0xf4a261, material: "Dievar (高韧性热作钢)", pos: [0.0, 0.18, 0.0], size: [1.68, 0.52, 1.45], roughness: 0.58, metalness: 0.42 },
                    { id: "sliders", name: "侧抽芯滑块组", side: "动模", color: 0x9c89b8, material: "氮化钢 + 耐磨涂层", pos: [1.28, 0.08, -1.08], size: [0.72, 0.38, 0.52], roughness: 0.44, metalness: 0.52 },
                    { id: "ejector_plate", name: "顶杆固定板镶块", side: "动模", color: 0x70d6ff, material: "Cr12MoV 工具钢", pos: [-1.18, -0.06, -0.68], size: [0.82, 0.22, 0.84], roughness: 0.68, metalness: 0.24 }
                ]
            },
            "M002": {
                name: "后地板模具",
                description: "一体化后地板 | 5个镶块 (简化示例)",
                inserts: [
                    { id: "fixed_main", name: "定模大型面镶块", side: "定模", color: 0x5e9bff, material: "H13改进型", pos: [0.0, 0.65, 0.0], size: [2.0, 0.45, 1.8], roughness: 0.5, metalness: 0.3 },
                    { id: "runner", name: "横浇道镶块", side: "定模", color: 0xd97706, material: "DHA™-GIGA", pos: [1.1, 0.7, 1.0], size: [0.6, 0.3, 0.6], roughness: 0.25, metalness: 0.75 },
                    { id: "movable_core", name: "动模型腔镶块", side: "动模", color: 0xf59e0b, material: "Dievar", pos: [0.0, 0.2, 0.0], size: [1.9, 0.55, 1.7], roughness: 0.55, metalness: 0.4 },
                    { id: "side_core", name: "侧抽芯机构", side: "动模", color: 0x8b5cf6, material: "SKD61+渗氮", pos: [1.3, 0.1, -1.2], size: [0.65, 0.4, 0.6], roughness: 0.45, metalness: 0.5 },
                    { id: "ejector", name: "顶杆镶块", side: "动模", color: 0x10b981, material: "Cr12MoV", pos: [-1.0, -0.05, -0.9], size: [0.7, 0.2, 0.7], roughness: 0.6, metalness: 0.2 }
                ]
            },
            "M003": {
                name: "左右滑块模具",
                description: "高强钢替代件 | 4个镶块",
                inserts: [
                    { id: "fixed_part", name: "定模镶块", side: "定模", color: 0xec4899, material: "H13+涂层", pos: [0.0, 0.6, 0.0], size: [1.5, 0.4, 1.2], roughness: 0.4, metalness: 0.4 },
                    { id: "gate_insert", name: "浇口镶块", side: "定模", color: 0xf97316, material: "CPM 10V", pos: [0.9, 0.68, 0.7], size: [0.5, 0.25, 0.5], roughness: 0.2, metalness: 0.85 },
                    { id: "movable_part", name: "动模镶块", side: "动模", color: 0x14b8a6, material: "DH31-EX", pos: [0.0, 0.15, 0.0], size: [1.4, 0.45, 1.1], roughness: 0.5, metalness: 0.45 },
                    { id: "cooling_insert", name: "冷却镶块", side: "动模", color: 0x06b6d4, material: "3D打印铜合金", pos: [-0.9, 0.05, -0.8], size: [0.6, 0.2, 0.6], roughness: 0.3, metalness: 0.6 }
                ]
            }
        };

        // ========= 2. 初始化场景等 (固定部分) =========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.006);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4.5, 3.8, 5.2);
        camera.lookAt(0, 0.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // 轨道控制
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.target.set(0, 0.35, 0);

        // 灯光系统 (保持不变)
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(2.5, 5, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4488cc, 0.35);
        backLight.position.set(-2, 1.5, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.45);
        fillLight.position.set(1.2, 2.2, 2);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0x88aaff, 0.3);
        rimLight.position.set(0.5, -1, 1.8);
        scene.add(rimLight);

        // 辅助元素 (网格、底板、参考线)
        const gridHelper = new THREE.GridHelper(7.5, 24, 0x77aaff, 0x335588);
        gridHelper.position.y = -0.75;
        scene.add(gridHelper);
        const basePlate = new THREE.Mesh(
            new THREE.PlaneGeometry(5.2, 4.5),
            new THREE.MeshStandardMaterial({ color: 0x2c5f8a, side: THREE.DoubleSide, transparent: true, opacity: 0.12 })
        );
        basePlate.rotation.x = -Math.PI / 2;
        basePlate.position.y = -0.7;
        basePlate.receiveShadow = true;
        scene.add(basePlate);
        const outlineBox = new THREE.BoxGeometry(3.4, 1.2, 3.0);
        const edgesGeo = new THREE.EdgesGeometry(outlineBox);
        const outlineMat = new THREE.LineBasicMaterial({ color: 0x5f9eff, transparent: true, opacity: 0.3 });
        const wireframe = new THREE.LineSegments(edgesGeo, outlineMat);
        wireframe.position.set(0, 0.15, 0);
        scene.add(wireframe);
        const partingPlaneMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, side: THREE.DoubleSide, transparent: true, opacity: 0.08 });
        const partingPlane = new THREE.Mesh(new THREE.PlaneGeometry(3.2, 2.8), partingPlaneMat);
        partingPlane.rotation.x = -Math.PI / 2;
        partingPlane.position.y = 0.38;
        scene.add(partingPlane);

        // ========= 3. 全局变量 =========
        let currentMoldId = "M001";
        let currentMeshes = [];     // 存储当前模具的所有Mesh对象
        let currentLabels = [];      // 存储当前模具的CSS2D标签
        let currentHighlight = null;
        let lockedMesh = null;
        
        const materialContent = document.getElementById('material-content');
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 交互函数 (高亮/面板更新) 与之前类似，但需要操作currentMeshes
        function resetHighlight(obj) {
            if (obj && obj.material) {
                obj.material.emissiveIntensity = 0;
                obj.material.emissive.setHex(0x000000);
            }
        }
        function applyHighlight(obj) {
            if (obj && obj.material) {
                obj.material.emissiveIntensity = 0.52;
                obj.material.emissive.setHex(0x8866ff);
            }
        }
        function updateMaterialPanel(obj, isLocked = false) {
            if (!obj) {
                if (!lockedMesh) {
                    materialContent.innerHTML = `👆 鼠标悬停或点击任意镶块区域<br><span style="font-size:12px; color:#aaa;">显示对应材料及属性</span>`;
                }
                return;
            }
            const data = obj.userData;
            const lockIcon = isLocked ? '🔒 ' : '';
            materialContent.innerHTML = `
                <strong style="color:#ffcc77">${lockIcon}${data.name}</strong><br>
                📍 所属: ${data.side || '—'}<br>
                🔩 材料: ${data.material}<br>
                🎨 标识: #${data.colorHex}<br>
                ${isLocked ? '<span style="font-size:12px;">✅ 已锁定 (再次点击解锁)</span>' : '<span style="font-size:12px;">💡 点击可锁定查看</span>'}
            `;
        }
        
        function onMouseMove(event) {
            if (lockedMesh) return;
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(currentMeshes);
            if (currentHighlight) {
                resetHighlight(currentHighlight);
                currentHighlight = null;
            }
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                currentHighlight = hit;
                applyHighlight(hit);
                updateMaterialPanel(hit, false);
            } else {
                if (!lockedMesh) {
                    materialContent.innerHTML = `👆 鼠标悬停或点击任意镶块区域<br><span style="font-size:12px; color:#aaa;">显示对应材料及属性</span>`;
                }
            }
        }
        
        function onClick(event) {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(currentMeshes);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                if (lockedMesh === hit) {
                    lockedMesh = null;
                    updateMaterialPanel(null);
                    if (currentHighlight) {
                        resetHighlight(currentHighlight);
                        currentHighlight = null;
                    }
                    const fakeEvent = new MouseEvent('mousemove', { clientX: event.clientX, clientY: event.clientY });
                    onMouseMove(fakeEvent);
                } else {
                    if (lockedMesh) resetHighlight(lockedMesh);
                    lockedMesh = hit;
                    if (currentHighlight && currentHighlight !== lockedMesh) resetHighlight(currentHighlight);
                    currentHighlight = lockedMesh;
                    applyHighlight(lockedMesh);
                    updateMaterialPanel(lockedMesh, true);
                }
            } else {
                if (lockedMesh) {
                    resetHighlight(lockedMesh);
                    lockedMesh = null;
                    updateMaterialPanel(null);
                    const fakeEvent = new MouseEvent('mousemove', { clientX: event.clientX, clientY: event.clientY });
                    onMouseMove(fakeEvent);
                }
            }
        }
        
        window.addEventListener('mousemove', onMouseMove, false);
        window.addEventListener('click', onClick, false);
        
        // ========= 4. 核心函数：根据模具数据加载/重新生成模型 =========
        function loadMold(moldId) {
            // 清除当前模型
            currentMeshes.forEach(mesh => {
                scene.remove(mesh);
                // 如果有材质需要dispose可加，但简单场景无需
            });
            currentLabels.forEach(label => {
                scene.remove(label);
            });
            currentMeshes = [];
            currentLabels = [];
            // 清除高亮和锁定
            if (currentHighlight) resetHighlight(currentHighlight);
            currentHighlight = null;
            lockedMesh = null;
            
            const mold = moldsData[moldId];
            if (!mold) return;
            
            // 更新UI面板的描述信息
            document.getElementById('mold-info').innerHTML = `📌 ${mold.name}<br>${mold.description}`;
            
            // 根据该模具的inserts数组生成物体和标签
            mold.inserts.forEach(data => {
                const geometry = new THREE.BoxGeometry(data.size[0], data.size[1], data.size[2]);
                const material = new THREE.MeshStandardMaterial({
                    color: data.color,
                    roughness: data.roughness,
                    metalness: data.metalness,
                    emissive: 0x000000
                });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(data.pos[0], data.pos[1], data.pos[2]);
                cube.castShadow = true;
                cube.userData = {
                    id: data.id,
                    name: data.name,
                    material: data.material,
                    side: data.side,
                    colorHex: data.color.toString(16)
                };
                scene.add(cube);
                currentMeshes.push(cube);
                
                // CSS2D文字标签
                const div = document.createElement('div');
                div.textContent = `${data.name}`;
                div.style.color = '#fff';
                div.style.fontSize = '13px';
                div.style.fontWeight = '600';
                div.style.textShadow = '1px 1px 0 #000';
                div.style.backgroundColor = `rgba(0,0,0,0.65)`;
                div.style.padding = '3px 10px';
                div.style.borderRadius = '20px';
                div.style.borderLeft = `3px solid #${data.color.toString(16)}`;
                div.style.whiteSpace = 'nowrap';
                div.style.fontFamily = 'system-ui, sans-serif';
                div.style.backdropFilter = 'blur(4px)';
                const label = new CSS2DObject(div);
                label.position.set(data.pos[0], data.pos[1] + data.size[1]/2 + 0.16, data.pos[2]);
                scene.add(label);
                currentLabels.push(label);
            });
            
            // 可选：调整相机视角适应新模具？为了体验，保持相机位置不变，用户可以手动调整
        }
        
        // ========= 5. 生成UI按钮 =========
        const container = document.getElementById('mold-buttons-container');
        for (const [moldId, mold] of Object.entries(moldsData)) {
            const btn = document.createElement('button');
            btn.textContent = `${moldId} - ${mold.name}`;
            btn.classList.add('mold-btn');
            if (moldId === currentMoldId) btn.classList.add('active');
            btn.addEventListener('click', () => {
                // 更新按钮激活样式
                document.querySelectorAll('.mold-btn').forEach(btn => btn.classList.remove('active'));
                btn.classList.add('active');
                currentMoldId = moldId;
                loadMold(moldId);
            });
            container.appendChild(btn);
        }
        
        // 加载默认模具
        loadMold(currentMoldId);
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('多模具系统已启动，当前模具:', currentMoldId);
    </script>
</body>
</html>
